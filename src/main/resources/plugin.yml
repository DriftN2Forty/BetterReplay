name: ${project.artifactId}
main: ${mainClass}
version: ${project.version}
author: ${author}
depend: [packetevents]
api-version: 1.13
folia-supported: true
commands:
  replay:
    description: Replay base command

permissions:
  replay.*:
    description: Gives access to all replay commands
    children:
      replay.start: true
      replay.stop: true
      replay.list: true
      replay.delete: true
  replay.start:
    description: Allows starting a new recording
    default: op
  replay.stop:
    description: Allows stopping an active recording
    default: op
  replay.list:
    description: Allows listing saved replays
    default: true
  replay.delete:
    description: Allows deleting saved replays
    default: op